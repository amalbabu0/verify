<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto Close</title>
  <script>
    window.onload = function () {
      // Wait 1 second, then try to close the page
      setTimeout(function () {
        window.close();
      }, 1000);
    };
  </script>
</head>
<body>
  <p>This page will close automatically.</p>
</body>
</html>
