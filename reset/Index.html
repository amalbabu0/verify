<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>
<style>
  :root {
    --primary-blue: #2555D9;
    --bg: #F3F5F9;
    --text: #222;
    --muted: #888;
    --border: #E0E0E0;
    --error: #D9455F;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
  }

  .card {
    background: #fff;
    width: 420px;
    max-width: 90vw;
    padding: 40px 36px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    margin: 0 0 8px;
    text-align: center;
  }

  p.subtitle {
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    margin: 0 0 28px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #444;
    margin: 0 0 6px;
  }

  input[type="password"] {
    width: 100%;
    height: 45px;
    padding: 0 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    margin-bottom: 18px;
  }

  input[type="password"]:focus {
    outline: none;
    border-color: var(--primary-blue);
  }

  button {
    width: 100%;
    height: 48px;
    border: none;
    border-radius: 6px;
    background: var(--primary-blue);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }

  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: default; }

  .message {
    text-align: center;
    font-size: 14px;
    margin-top: 16px;
    line-height: 1.5;
  }

  .message.error { color: var(--error); }
  .message.success { color: #1D9A6C; }

  .hidden { display: none; }
</style>
</head>
<body>

  <div class="card">
    <h1>Reset Your Password</h1>
    <p class="subtitle" id="subtitle">Choose a new password for your account.</p>

    <form id="reset-form">
      <label for="password">New Password</label>
      <input type="password" id="password" required minlength="6" autocomplete="new-password">

      <label for="confirm-password">Confirm Password</label>
      <input type="password" id="confirm-password" required minlength="6" autocomplete="new-password">

      <button type="submit" id="submit-btn">Update Password</button>
    </form>

    <div id="message" class="message hidden"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Same project this app already uses (see services/SupabaseService.cs).
    const SUPABASE_URL = "https://mngyqnyfqeamyhfpkuqk.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1uZ3lxbnlmcWVhbXloZnBrdXFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ4MDUwMjYsImV4cCI6MjEwMDM4MTAyNn0.5IogH328_PNo4tz8Ow0sRrhJa6ecyxsZBabeI1kc_f8";

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("reset-form");
    const submitBtn = document.getElementById("submit-btn");
    const subtitle = document.getElementById("subtitle");
    const messageEl = document.getElementById("message");

    let sessionReady = false;

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = "message " + type;
    }

    function disableForm(text) {
      form.classList.add("hidden");
      subtitle.textContent = text;
    }

    // supabase-js parses the recovery link's tokens out of the URL automatically
    // (detectSessionInUrl is on by default) and fires this event once that's done.
    sb.auth.onAuthStateChange((event, session) => {
      if (event === "PASSWORD_RECOVERY" && session) {
        sessionReady = true;
      }
    });

    // Fallback: some Supabase email templates send a token_hash query param
    // directly instead of routing through Supabase's hosted verify redirect.
    async function tryVerifyTokenHash() {
      const params = new URLSearchParams(window.location.search);
      const tokenHash = params.get("token_hash");
      const type = params.get("type");

      if (tokenHash && type === "recovery") {
        const { error } = await sb.auth.verifyOtp({ token_hash: tokenHash, type: "recovery" });
        if (!error) sessionReady = true;
      }
    }

    (async function init() {
      const params = new URLSearchParams(window.location.search);
      const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));

      const errorDescription = params.get("error_description") || hashParams.get("error_description");
      if (errorDescription) {
        disableForm("This link is invalid or has expired.");
        showMessage(decodeURIComponent(errorDescription.replace(/\+/g, " ")), "error");
        return;
      }

      await tryVerifyTokenHash();

      // Give onAuthStateChange a brief moment to fire for the hash-based flow.
      await new Promise((resolve) => setTimeout(resolve, 400));

      const { data } = await sb.auth.getSession();
      if (data.session) sessionReady = true;

      if (!sessionReady) {
        disableForm("This link is invalid or has expired.");
        showMessage("Please request a new password reset link from the app.", "error");
      }
    })();

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirm-password").value;

      if (password !== confirmPassword) {
        showMessage("Passwords do not match.", "error");
        return;
      }

      if (!sessionReady) {
        showMessage("This link is invalid or has expired.", "error");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Updating...";

      const { error } = await sb.auth.updateUser({ password });

      if (error) {
        showMessage(error.message, "error");
        submitBtn.disabled = false;
        submitBtn.textContent = "Update Password";
        return;
      }

      disableForm("All done!");
      showMessage("Your password has been updated. You can now log in from the app.", "success");
    });
  </script>

</body>
</html>
